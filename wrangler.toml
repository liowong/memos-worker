name = "memos-worker"
compatibility_date = "2025-08-19"
main = "src/index.js"
[assets]
directory = "./src/public"
run_worker_first = [
	"/api/*"
]

[[d1_databases]]
binding = "DB"
database_id = "92cfe1ee-3e42-4275-a4b3-b72ab1f1ae2a"
database_name = "notes-db"

[[kv_namespaces]]
binding = "NOTES_KV"
id = "c8ff7e28ef9c4f04a55f5f209bb2d9cc"
preview_id = ""

[[r2_buckets]]
binding = "NOTES_R2_BUCKET"
bucket_name = "notes-r2-bucket"
preview_bucket_name = "notes-files-preview"
